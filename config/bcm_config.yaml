system:
  name: BCM v7
  version: 0.1.0
  platform: x86
  log_level: INFO
  log_file: logs/bcm.log
modules:
  dashboard: true
  obd: true
  parking: true
  environment: true
  audio: true
  voice: true
  input: true
  camera: true
  power: true
  multimedia: true
display:
  dashboard:
    width: 800
    height: 480
    fps: 15
    theme: classic_alfa
    brightness: 70
  multimedia:
    width: 1024
    height: 600
units:
  speed: km/h
  temperature: C
language: pl
gpio:
  parking_trig: 79
  parking_echo:
  - 80
  - 81
  - 82
  - 83
  buzzer: 84
  backlight_dashboard: 32
  backlight_multimedia: 33
  onewire: 7
  ignition: 85
  door: 86
  rain_sensor: 87
  sprayer: 88
  central_lock: 89
serial:
  kline:
    port_opi: /dev/ttyS3
    baudrate: 10400
    ecu_address: 1
audio:
  eq_preset: jazz
  master_volume: 70
  dac: ES9038Q2M
  amp_main: TDA7388
  amp_sub: TDA2050
voice:
  wake_word_sensitivity: medium
  model_pl: src/voice/models/vosk-model-small-pl
  model_en: src/voice/models/vosk-model-small-en-us
camera:
  segment_minutes: 5
  max_storage_gb: 128
  recording_path: /media/dashcam
swc:
  enabled: true
  buttons:
    SWC_VOLUP: volume_up
    SWC_VOLDN: volume_down
    SWC_UP: menu_up
    SWC_DOWN: menu_down
    SWC_MUTE: mute
    SWC_MODE: home
    SWC_NEXT: next_track
    SWC_PREV: prev_track
    SWC_PICKUP: phone_pickup
    SWC_HANGUP: phone_hangup
    SWC_VOICE: voice_trigger
    SWC_SRC: source_cycle
brightness:
  mode: auto
  steps:
  - 15
  - 30
  - 45
  - 60
  - 80
  - 100
music_panel:
  enabled: true
wifi:
  enabled: true
  ssid: Alfa156_AA
  password: alfa156headunit
  channel: 6
  interface: ''
  ip: 10.0.0.1
  netmask: 255.255.255.0
  dhcp_start: 10.0.0.10
  dhcp_end: 10.0.0.50
power:
  shutdown_delay_seconds: 30
  backlight_fade_ms: 1000
