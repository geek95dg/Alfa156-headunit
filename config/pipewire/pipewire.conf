# BCM v7 — PipeWire configuration for USB DAC
#
# This config is used on Orange Pi 5 Plus with a USB DAC
# (PCM5102A or ES9038Q2M). On x86, PipeWire uses its defaults.
#
# Place this file at: ~/.config/pipewire/pipewire.conf.d/bcm-v7.conf
# or copy to /etc/pipewire/pipewire.conf.d/bcm-v7.conf

context.properties = {
    # Set USB DAC as default
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 ]
    default.clock.quantum       = 1024
    default.clock.min-quantum   = 512
    default.clock.max-quantum   = 2048
}

context.modules = [
    # Load the real-time module for low-latency audio
    { name = libpipewire-module-rt
        args = {
            nice.level    = -11
            rt.prio       = 88
        }
    }
]

# Filter chain for 10-band parametric EQ
# Loaded via: pw-filter-chain eq-profile.json
context.exec = [
    # EQ filter chain is started separately by the audio module
    # to allow dynamic preset switching
]
