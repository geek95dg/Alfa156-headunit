<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="monospace" font-size="11">
  <title>BCM v7 — Audio System Wiring</title>
  <style>
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 2; rx: 6; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .audio { stroke: #906; stroke-width: 2; fill: none; }
    .label { font-size: 11px; fill: #333; text-anchor: middle; }
    .title { font-size: 14px; font-weight: bold; fill: #111; }
    .pin { font-size: 9px; fill: #666; }
    .comp { font-size: 10px; fill: #06c; text-anchor: middle; }
  </style>

  <text x="450" y="25" class="title" text-anchor="middle">Audio System — USB DAC → TPA3116D2 Amp → 4.1 Speakers</text>

  <!-- PipeWire (software) -->
  <rect x="30" y="80" width="140" height="80" class="box" fill="#f0e0ff"/>
  <text x="100" y="100" class="label" font-weight="bold">PipeWire</text>
  <text x="100" y="118" class="pin">Audio routing</text>
  <text x="100" y="133" class="pin">10-band EQ</text>
  <text x="100" y="148" class="pin">Ducking mixer</text>

  <!-- Sources -->
  <rect x="30" y="190" width="140" height="90" class="box" fill="#e0e0ff"/>
  <text x="100" y="210" class="label" font-weight="bold">Sources</text>
  <text x="100" y="228" class="pin">Android Auto</text>
  <text x="100" y="243" class="pin">BT A2DP</text>
  <text x="100" y="258" class="pin">FM Radio (RTL-SDR)</text>
  <text x="100" y="273" class="pin">System TTS/Beeps</text>
  <line x1="100" y1="190" x2="100" y2="160" class="wire" stroke="#906"/>

  <!-- USB DAC -->
  <rect x="220" y="90" width="140" height="60" class="box" fill="#fff0ff"/>
  <text x="290" y="112" class="label" font-weight="bold">USB DAC</text>
  <text x="290" y="130" class="pin">PCM5102A / ES9038Q2M</text>
  <text x="290" y="145" class="pin">USB audio class</text>
  <line x1="170" y1="120" x2="220" y2="120" class="audio"/>
  <text x="195" y="115" class="pin">USB</text>

  <!-- RCA output -->
  <line x1="360" y1="120" x2="420" y2="120" class="audio"/>
  <text x="390" y="112" class="pin">RCA L/R</text>

  <!-- TPA3116D2 Amplifier -->
  <rect x="420" y="60" width="180" height="120" class="box" fill="#ffe0e0"/>
  <text x="510" y="85" class="label" font-weight="bold">TPA3116D2</text>
  <text x="510" y="100" class="label">4.1 Channel Amp</text>
  <text x="510" y="120" class="pin">12V direct from battery</text>
  <text x="510" y="135" class="pin">Class D, ~50W×4 + 100W sub</text>
  <text x="510" y="150" class="pin">Outputs: FL, FR, RL, RR, SUB</text>

  <!-- 12V power to amp -->
  <line x1="510" y1="60" x2="510" y2="40" class="wire" stroke="#c00"/>
  <text x="510" y="35" class="comp">12V / 20A fused</text>

  <!-- Speakers -->
  <rect x="660" y="50" width="130" height="40" class="box" fill="#e0ffe0"/>
  <text x="725" y="68" class="label">Front Left</text>
  <text x="725" y="82" class="pin">Door speaker</text>
  <line x1="600" y1="80" x2="660" y2="70" class="audio"/>

  <rect x="660" y="100" width="130" height="40" class="box" fill="#e0ffe0"/>
  <text x="725" y="118" class="label">Front Right</text>
  <text x="725" y="132" class="pin">Door speaker</text>
  <line x1="600" y1="100" x2="660" y2="120" class="audio"/>

  <rect x="660" y="160" width="130" height="40" class="box" fill="#e0ffe0"/>
  <text x="725" y="178" class="label">Rear Left</text>
  <text x="725" y="192" class="pin">Shelf speaker</text>
  <line x1="600" y1="120" x2="660" y2="180" class="audio"/>

  <rect x="660" y="220" width="130" height="40" class="box" fill="#e0ffe0"/>
  <text x="725" y="238" class="label">Rear Right</text>
  <text x="725" y="252" class="pin">Shelf speaker</text>
  <line x1="600" y1="140" x2="660" y2="240" class="audio"/>

  <rect x="660" y="280" width="130" height="50" class="box" fill="#ffe0e0"/>
  <text x="725" y="300" class="label" font-weight="bold">Subwoofer</text>
  <text x="725" y="320" class="pin">Trunk mount</text>
  <line x1="600" y1="160" x2="660" y2="305" class="audio"/>

  <!-- Notes -->
  <rect x="30" y="330" width="600" height="50" fill="#f8f8ff" stroke="#ccc" rx="4"/>
  <text x="50" y="350" class="pin" text-anchor="start">Signal chain: Audio Source → PipeWire (mix/EQ/duck) → USB DAC → RCA → TPA3116D2 → Speakers</text>
  <text x="50" y="365" class="pin" text-anchor="start">Ducking: parking beeps -18dB, voice -12dB (+3dB boost), phone -15dB. 1s fade-back.</text>
</svg>
