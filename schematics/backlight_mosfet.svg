<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="monospace" font-size="11">
  <title>BCM v7 — Dual MOSFET Backlight PWM Circuits</title>
  <style>
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 2; rx: 6; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #333; text-anchor: middle; }
    .title { font-size: 14px; font-weight: bold; fill: #111; }
    .pin { font-size: 9px; fill: #666; }
    .comp { font-size: 10px; fill: #06c; text-anchor: middle; }
  </style>

  <text x="400" y="25" class="title" text-anchor="middle">Backlight PWM Driver — BC547 + IRLZ44N (×2 channels)</text>

  <!-- Channel A: 4.3" Display -->
  <text x="200" y="60" class="label" font-weight="bold">Channel A — 4.3" Display (PWM2, pin 32)</text>

  <!-- GPIO -->
  <rect x="30" y="80" width="80" height="30" class="box" fill="#e0f0ff"/>
  <text x="70" y="100" class="comp">GPIO PWM2</text>
  <text x="70" y="115" class="pin">Pin 32</text>

  <!-- 1kΩ -->
  <rect x="140" y="85" width="40" height="15" fill="#ffe" stroke="#333" rx="2"/>
  <text x="160" y="97" class="comp">1kΩ</text>
  <line x1="110" y1="95" x2="140" y2="92" class="wire"/>

  <!-- BC547 -->
  <rect x="210" y="70" width="70" height="55" class="box" fill="#fff0f0"/>
  <text x="245" y="90" class="comp" font-weight="bold">BC547</text>
  <text x="215" y="105" class="pin">B</text>
  <text x="245" y="120" class="pin">E</text>
  <text x="275" y="105" class="pin">C</text>
  <line x1="180" y1="92" x2="210" y2="98" class="wire"/>

  <!-- 10kΩ pull-down -->
  <rect x="300" y="85" width="40" height="15" fill="#ffe" stroke="#333" rx="2"/>
  <text x="320" y="97" class="comp">10kΩ</text>
  <line x1="280" y1="95" x2="300" y2="92" class="wire"/>

  <!-- IRLZ44N -->
  <rect x="370" y="70" width="90" height="55" class="box" fill="#f0ffe0"/>
  <text x="415" y="90" class="comp" font-weight="bold">IRLZ44N</text>
  <text x="380" y="110" class="pin">G</text>
  <text x="415" y="120" class="pin">S</text>
  <text x="450" y="110" class="pin">D</text>
  <line x1="340" y1="92" x2="370" y2="98" class="wire"/>

  <!-- GND lines -->
  <line x1="245" y1="125" x2="245" y2="160" class="wire"/>
  <line x1="415" y1="125" x2="415" y2="160" class="wire"/>
  <line x1="245" y1="160" x2="415" y2="160" class="wire"/>
  <text x="330" y="175" class="pin">GND</text>

  <!-- Display load -->
  <rect x="490" y="70" width="110" height="40" class="box" fill="#e0ffe0"/>
  <text x="545" y="88" class="label">4.3" Backlight</text>
  <text x="545" y="103" class="pin">GND wire</text>
  <line x1="460" y1="95" x2="490" y2="90" class="wire"/>

  <!-- 12V to display -->
  <line x1="545" y1="70" x2="545" y2="50" class="wire" stroke="#c00"/>
  <text x="545" y="45" class="comp">12V</text>

  <!-- Channel B: 7" Display (offset down) -->
  <text x="200" y="220" class="label" font-weight="bold">Channel B — 7" Display (PWM3, pin 33)</text>

  <rect x="30" y="240" width="80" height="30" class="box" fill="#e0f0ff"/>
  <text x="70" y="260" class="comp">GPIO PWM3</text>
  <text x="70" y="275" class="pin">Pin 33</text>

  <rect x="140" y="245" width="40" height="15" fill="#ffe" stroke="#333" rx="2"/>
  <text x="160" y="257" class="comp">1kΩ</text>
  <line x1="110" y1="255" x2="140" y2="252" class="wire"/>

  <rect x="210" y="230" width="70" height="55" class="box" fill="#fff0f0"/>
  <text x="245" y="250" class="comp" font-weight="bold">BC547</text>
  <text x="215" y="265" class="pin">B</text>
  <text x="245" y="280" class="pin">E</text>
  <text x="275" y="265" class="pin">C</text>
  <line x1="180" y1="252" x2="210" y2="258" class="wire"/>

  <rect x="300" y="245" width="40" height="15" fill="#ffe" stroke="#333" rx="2"/>
  <text x="320" y="257" class="comp">10kΩ</text>
  <line x1="280" y1="255" x2="300" y2="252" class="wire"/>

  <rect x="370" y="230" width="90" height="55" class="box" fill="#f0ffe0"/>
  <text x="415" y="250" class="comp" font-weight="bold">IRLZ44N</text>
  <text x="380" y="270" class="pin">G</text>
  <text x="415" y="280" class="pin">S</text>
  <text x="450" y="270" class="pin">D</text>
  <line x1="340" y1="252" x2="370" y2="258" class="wire"/>

  <line x1="245" y1="285" x2="245" y2="320" class="wire"/>
  <line x1="415" y1="285" x2="415" y2="320" class="wire"/>
  <line x1="245" y1="320" x2="415" y2="320" class="wire"/>
  <text x="330" y="335" class="pin">GND</text>

  <rect x="490" y="230" width="110" height="40" class="box" fill="#e0ffe0"/>
  <text x="545" y="248" class="label">7" Backlight</text>
  <text x="545" y="263" class="pin">GND wire</text>
  <line x1="460" y1="255" x2="490" y2="250" class="wire"/>
  <line x1="545" y1="230" x2="545" y2="210" class="wire" stroke="#c00"/>
  <text x="545" y="205" class="comp">12V</text>

  <!-- Notes -->
  <rect x="30" y="370" width="740" height="60" fill="#f8f8ff" stroke="#ccc" rx="4"/>
  <text x="50" y="390" class="pin" text-anchor="start">• BC547 NPN inverts PWM signal and provides gate drive current for IRLZ44N</text>
  <text x="50" y="405" class="pin" text-anchor="start">• IRLZ44N (logic-level MOSFET) switches backlight GND; display VCC stays at 12V</text>
  <text x="50" y="420" class="pin" text-anchor="start">• PWM frequency: 1kHz. 10kΩ pull-down on gate ensures MOSFET OFF when OPi boots</text>
</svg>
