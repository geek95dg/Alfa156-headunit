<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="monospace" font-size="11">
  <title>BCM v7 — L9637D K-Line Transceiver Schematic</title>
  <style>
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 2; rx: 6; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #333; text-anchor: middle; }
    .title { font-size: 14px; font-weight: bold; fill: #111; }
    .pin { font-size: 9px; fill: #666; }
    .comp { font-size: 10px; fill: #06c; text-anchor: middle; }
  </style>

  <text x="350" y="25" class="title" text-anchor="middle">K-Line Interface — L9637D Transceiver</text>

  <!-- OPi GPIO -->
  <rect x="30" y="100" width="120" height="120" class="box" fill="#e0f0ff"/>
  <text x="90" y="125" class="label" font-weight="bold">OPi GPIO</text>
  <text x="90" y="145" class="pin">Pin 8 → UART TX</text>
  <text x="90" y="165" class="pin">Pin 10 → UART RX</text>
  <text x="90" y="185" class="pin">Pin 6 → GND</text>
  <text x="90" y="205" class="pin">3.3V logic</text>

  <!-- L9637D IC -->
  <rect x="250" y="80" width="160" height="200" class="box" fill="#fffff0"/>
  <text x="330" y="105" class="label" font-weight="bold">L9637D</text>
  <text x="330" y="120" class="pin">K-Line Transceiver</text>

  <!-- Pins -->
  <text x="260" y="155" class="pin">1 TXD ←</text>
  <text x="260" y="180" class="pin">2 RXD →</text>
  <text x="260" y="205" class="pin">3 GND</text>
  <text x="260" y="230" class="pin">4 VCC (5V)</text>
  <text x="260" y="255" class="pin">5 NC</text>
  <text x="400" y="155" class="pin">→ 8 K-Line</text>
  <text x="400" y="180" class="pin">7 NC</text>
  <text x="400" y="205" class="pin">6 EN (VCC)</text>

  <!-- TX wire -->
  <line x1="150" y1="145" x2="250" y2="150" class="wire"/>
  <text x="200" y="140" class="pin">TX</text>

  <!-- RX wire -->
  <line x1="150" y1="165" x2="250" y2="175" class="wire"/>
  <text x="200" y="172" class="pin">RX</text>

  <!-- GND -->
  <line x1="150" y1="185" x2="250" y2="200" class="wire"/>

  <!-- VCC 5V -->
  <line x1="330" y1="80" x2="330" y2="60" class="wire" stroke="#c00"/>
  <text x="330" y="55" class="comp">5V (LM2596)</text>

  <!-- 100nF decoupling -->
  <rect x="355" y="50" width="40" height="20" fill="#ffe" stroke="#333" rx="2"/>
  <text x="375" y="64" class="comp">100nF</text>
  <line x1="355" y1="60" x2="330" y2="60" class="wire"/>
  <line x1="395" y1="60" x2="420" y2="60" class="wire"/>
  <line x1="420" y1="60" x2="420" y2="330" class="wire"/>
  <text x="430" y="340" class="pin">GND</text>

  <!-- K-Line output -->
  <line x1="410" y1="150" x2="500" y2="150" class="wire" stroke="#c00"/>

  <!-- 510Ω pull-up -->
  <rect x="480" y="80" width="40" height="15" fill="#ffe" stroke="#333" rx="2"/>
  <text x="500" y="75" class="comp">510Ω</text>
  <line x1="500" y1="95" x2="500" y2="150" class="wire"/>
  <line x1="500" y1="80" x2="500" y2="55" class="wire" stroke="#c00"/>
  <text x="500" y="50" class="comp">12V (battery)</text>

  <!-- OBD connector -->
  <rect x="550" y="120" width="120" height="80" class="box" fill="#f0f0e0"/>
  <text x="610" y="145" class="label" font-weight="bold">OBD-II Port</text>
  <text x="610" y="165" class="pin">Pin 7: K-Line</text>
  <text x="610" y="180" class="pin">Pin 4/5: GND</text>
  <text x="610" y="195" class="pin">Pin 16: 12V</text>
  <line x1="500" y1="150" x2="550" y2="160" class="wire" stroke="#c00"/>

  <!-- Notes -->
  <rect x="30" y="300" width="640" height="80" fill="#f8f8ff" stroke="#ccc" rx="4"/>
  <text x="50" y="320" class="pin" text-anchor="start">Notes:</text>
  <text x="50" y="335" class="pin" text-anchor="start">• L9637D handles K-Line protocol (ISO 9141-2 / ISO 14230)</text>
  <text x="50" y="350" class="pin" text-anchor="start">• 510Ω pull-up to 12V keeps K-Line HIGH when idle</text>
  <text x="50" y="365" class="pin" text-anchor="start">• 100nF ceramic cap between VCC and GND for noise filtering</text>
</svg>
