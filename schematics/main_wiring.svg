<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="monospace" font-size="12">
  <title>BCM v7 — Complete System Wiring Overview</title>
  <style>
    .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; rx: 8; }
    .wire { stroke: #333; stroke-width: 2; fill: none; }
    .power { stroke: #c00; stroke-width: 2.5; fill: none; }
    .data { stroke: #06c; stroke-width: 1.5; fill: none; stroke-dasharray: 6 3; }
    .label { font-size: 11px; fill: #333; text-anchor: middle; }
    .title { font-size: 16px; font-weight: bold; fill: #111; }
    .subtitle { font-size: 10px; fill: #666; }
  </style>

  <!-- Title -->
  <text x="600" y="30" class="title" text-anchor="middle">BCM v7 — Alfa Romeo 156 Headunit — System Wiring Overview</text>

  <!-- Battery / Power -->
  <rect x="20" y="60" width="140" height="60" class="box" fill="#ffe0e0"/>
  <text x="90" y="85" class="label" font-weight="bold">CAR BATTERY</text>
  <text x="90" y="100" class="label">12V / 70Ah</text>

  <!-- Fuse -->
  <rect x="200" y="70" width="80" height="40" class="box" fill="#fff0e0"/>
  <text x="240" y="95" class="label">20A FUSE</text>

  <!-- LM2596 -->
  <rect x="320" y="60" width="120" height="60" class="box" fill="#fff0e0"/>
  <text x="380" y="82" class="label" font-weight="bold">LM2596</text>
  <text x="380" y="97" class="label">12V → 5.1V</text>
  <text x="380" y="112" class="label">4A max</text>

  <!-- Power lines -->
  <line x1="160" y1="90" x2="200" y2="90" class="power"/>
  <line x1="280" y1="90" x2="320" y2="90" class="power"/>

  <!-- Orange Pi -->
  <rect x="500" y="50" width="200" height="80" class="box" fill="#e0f0ff"/>
  <text x="600" y="75" class="label" font-weight="bold">ORANGE PI 5 PLUS</text>
  <text x="600" y="90" class="label">RK3588 / 16GB RAM</text>
  <text x="600" y="105" class="label">USB-C PD 5.1V/4A</text>

  <line x1="440" y1="90" x2="500" y2="90" class="power"/>

  <!-- 12V direct to Amp -->
  <line x1="240" y1="110" x2="240" y2="720" class="power"/>
  <rect x="180" y="720" width="120" height="50" class="box" fill="#ffe0e0"/>
  <text x="240" y="742" class="label" font-weight="bold">TPA3116D2</text>
  <text x="240" y="757" class="label">4.1 Amp 12V</text>

  <!-- 4.3" Display -->
  <rect x="750" y="50" width="160" height="60" class="box" fill="#e0ffe0"/>
  <text x="830" y="72" class="label" font-weight="bold">4.3" TFT</text>
  <text x="830" y="87" class="label">480×272 SPI/HDMI</text>
  <line x1="700" y1="80" x2="750" y2="80" class="data"/>

  <!-- 7" Display -->
  <rect x="750" y="130" width="160" height="60" class="box" fill="#e0ffe0"/>
  <text x="830" y="152" class="label" font-weight="bold">7" IPS Touch</text>
  <text x="830" y="167" class="label">1024×600 HDMI-2</text>
  <line x1="700" y1="160" x2="750" y2="160" class="data"/>

  <!-- USB DAC -->
  <rect x="500" y="170" width="160" height="50" class="box" fill="#fff0ff"/>
  <text x="580" y="192" class="label" font-weight="bold">USB DAC</text>
  <text x="580" y="207" class="label">PCM5102A / ES9038</text>
  <line x1="580" y1="220" x2="580" y2="250" class="wire"/>
  <text x="580" y="265" class="label">RCA out →</text>
  <line x1="580" y1="270" x2="300" y2="720" class="wire"/>

  <!-- L9637D K-Line -->
  <rect x="500" y="290" width="160" height="50" class="box" fill="#fffff0"/>
  <text x="580" y="312" class="label" font-weight="bold">L9637D</text>
  <text x="580" y="327" class="label">K-Line Transceiver</text>
  <line x1="600" y1="130" x2="600" y2="290" class="data"/>

  <!-- OBD Port -->
  <rect x="750" y="290" width="120" height="50" class="box" fill="#fffff0"/>
  <text x="810" y="312" class="label" font-weight="bold">OBD-II Port</text>
  <text x="810" y="327" class="label">Pin 7 K-Line</text>
  <line x1="660" y1="315" x2="750" y2="315" class="wire"/>

  <!-- HC-SR04 Sensors -->
  <rect x="500" y="370" width="160" height="50" class="box" fill="#f0f0ff"/>
  <text x="580" y="392" class="label" font-weight="bold">4× HC-SR04</text>
  <text x="580" y="407" class="label">Ultrasonic Sensors</text>
  <line x1="580" y1="130" x2="555" y2="370" class="data"/>

  <!-- Buzzer -->
  <rect x="750" y="370" width="100" height="40" class="box"/>
  <text x="800" y="395" class="label">Buzzer</text>
  <line x1="660" y1="395" x2="750" y2="395" class="wire"/>

  <!-- Arduino -->
  <rect x="500" y="450" width="160" height="50" class="box" fill="#f0fff0"/>
  <text x="580" y="472" class="label" font-weight="bold">Arduino Pro Micro</text>
  <text x="580" y="487" class="label">Rotary + Buttons</text>
  <line x1="580" y1="130" x2="530" y2="450" class="data"/>
  <text x="520" y="445" class="subtitle">USB HID</text>

  <!-- DS18B20 -->
  <rect x="500" y="530" width="160" height="50" class="box" fill="#e0ffff"/>
  <text x="580" y="552" class="label" font-weight="bold">DS18B20</text>
  <text x="580" y="567" class="label">Temp Sensor (1-Wire)</text>
  <line x1="580" y1="130" x2="550" y2="530" class="data"/>

  <!-- AHD Cameras -->
  <rect x="500" y="610" width="160" height="50" class="box" fill="#ffe0ff"/>
  <text x="580" y="632" class="label" font-weight="bold">AHD Cameras ×2</text>
  <text x="580" y="647" class="label">USB3.0 Grabber</text>
  <line x1="580" y1="130" x2="560" y2="610" class="data"/>
  <text x="545" y="605" class="subtitle">USB 3.0</text>

  <!-- Optoisolators -->
  <rect x="750" y="460" width="160" height="60" class="box" fill="#fff8e0"/>
  <text x="830" y="482" class="label" font-weight="bold">5× PC817</text>
  <text x="830" y="497" class="label">Optoisolators</text>
  <text x="830" y="512" class="subtitle">IGN/DOOR/RAIN/SPRAY/LOCK</text>
  <line x1="700" y1="490" x2="750" y2="490" class="data"/>

  <!-- Car Signals -->
  <rect x="960" y="460" width="120" height="60" class="box" fill="#ffe0e0"/>
  <text x="1020" y="485" class="label" font-weight="bold">Vehicle</text>
  <text x="1020" y="500" class="label">12V Signals</text>
  <line x1="910" y1="490" x2="960" y2="490" class="power"/>

  <!-- Speakers -->
  <rect x="60" y="380" width="120" height="40" class="box"/>
  <text x="120" y="405" class="label">Front Speakers ×2</text>
  <rect x="60" y="440" width="120" height="40" class="box"/>
  <text x="120" y="465" class="label">Rear Speakers ×2</text>
  <rect x="60" y="500" width="120" height="40" class="box"/>
  <text x="120" y="525" class="label">Subwoofer</text>
  <line x1="180" y1="720" x2="120" y2="540" class="wire"/>
  <line x1="180" y1="730" x2="120" y2="480" class="wire"/>
  <line x1="180" y1="740" x2="120" y2="420" class="wire"/>

  <!-- USB Mic -->
  <rect x="750" y="220" width="120" height="40" class="box"/>
  <text x="810" y="245" class="label">USB Microphone</text>
  <line x1="700" y1="100" x2="750" y2="240" class="data"/>
  <text x="720" y="180" class="subtitle">USB</text>

  <!-- Legend -->
  <rect x="960" y="650" width="220" height="120" fill="#fafafa" stroke="#ccc" rx="4"/>
  <text x="1070" y="670" class="label" font-weight="bold">Legend</text>
  <line x1="975" y1="690" x2="1025" y2="690" class="power"/>
  <text x="1100" y="694" class="subtitle">12V Power</text>
  <line x1="975" y1="710" x2="1025" y2="710" class="data"/>
  <text x="1100" y="714" class="subtitle">Data / Signal</text>
  <line x1="975" y1="730" x2="1025" y2="730" class="wire"/>
  <text x="1100" y="734" class="subtitle">Audio / Analog</text>
</svg>
