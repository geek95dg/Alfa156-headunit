<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="monospace" font-size="11">
  <title>BCM v7 — PC817 Optoisolator Circuits</title>
  <style>
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 2; rx: 6; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #333; text-anchor: middle; }
    .title { font-size: 14px; font-weight: bold; fill: #111; }
    .pin { font-size: 9px; fill: #666; }
    .comp { font-size: 10px; fill: #06c; text-anchor: middle; }
  </style>

  <text x="400" y="25" class="title" text-anchor="middle">Vehicle Signal Isolation — 5× PC817 Optoisolators</text>

  <!-- Generic circuit (detailed) -->
  <text x="400" y="55" class="label" font-weight="bold">Circuit Detail (repeated ×5)</text>

  <!-- Vehicle 12V signal -->
  <rect x="30" y="80" width="100" height="40" class="box" fill="#ffe0e0"/>
  <text x="80" y="98" class="label">Vehicle 12V</text>
  <text x="80" y="112" class="pin">Signal wire</text>

  <!-- 4.7kΩ -->
  <rect x="160" y="88" width="50" height="15" fill="#ffe" stroke="#333" rx="2"/>
  <text x="185" y="99" class="comp">4.7kΩ</text>
  <line x1="130" y1="95" x2="160" y2="95" class="wire" stroke="#c00"/>
  <line x1="210" y1="95" x2="240" y2="95" class="wire"/>

  <!-- PC817 -->
  <rect x="240" y="70" width="120" height="80" class="box" fill="#fff8e0"/>
  <text x="300" y="90" class="label" font-weight="bold">PC817</text>
  <text x="270" y="110" class="pin">LED→</text>
  <text x="330" y="110" class="pin">←Photo</text>
  <text x="270" y="130" class="pin">Anode</text>
  <text x="270" y="143" class="pin">Cathode</text>
  <text x="330" y="130" class="pin">Collector</text>
  <text x="330" y="143" class="pin">Emitter</text>

  <!-- LED side GND -->
  <line x1="270" y1="150" x2="270" y2="175" class="wire"/>
  <text x="270" y="188" class="pin">GND (vehicle)</text>

  <!-- Phototransistor side -->
  <line x1="360" y1="125" x2="420" y2="125" class="wire"/>

  <!-- 10kΩ pull-up -->
  <rect x="390" y="80" width="50" height="15" fill="#ffe" stroke="#333" rx="2"/>
  <text x="415" y="92" class="comp">10kΩ</text>
  <line x1="415" y1="80" x2="415" y2="65" class="wire" stroke="#060"/>
  <text x="415" y="60" class="comp">3.3V</text>
  <line x1="415" y1="95" x2="415" y2="125" class="wire"/>

  <!-- To GPIO -->
  <rect x="450" y="110" width="100" height="30" class="box" fill="#e0f0ff"/>
  <text x="500" y="130" class="label">OPi GPIO</text>
  <line x1="420" y1="125" x2="450" y2="125" class="wire"/>

  <!-- Emitter GND -->
  <line x1="330" y1="150" x2="330" y2="175" class="wire"/>
  <text x="330" y="188" class="pin">GND (OPi)</text>

  <!-- Note: separate grounds -->
  <rect x="160" y="195" width="300" height="20" fill="#fff0f0" stroke="#c66" rx="3"/>
  <text x="310" y="209" class="pin">⚠ Vehicle GND and OPi GND are ISOLATED (that's the point!)</text>

  <!-- 5 channel table -->
  <text x="400" y="250" class="label" font-weight="bold">Channel Assignments</text>

  <rect x="100" y="265" width="600" height="190" fill="#fafafa" stroke="#ccc" rx="4"/>

  <!-- Header -->
  <text x="160" y="285" class="label" font-weight="bold">#</text>
  <text x="260" y="285" class="label" font-weight="bold">Signal</text>
  <text x="400" y="285" class="label" font-weight="bold">Source</text>
  <text x="540" y="285" class="label" font-weight="bold">GPIO Pin</text>
  <line x1="110" y1="292" x2="690" y2="292" stroke="#ccc"/>

  <!-- Row 1 -->
  <text x="160" y="312" class="label">1</text>
  <text x="260" y="312" class="label">Ignition ON</text>
  <text x="400" y="312" class="label">IGN wire (key pos. II)</text>
  <text x="540" y="312" class="label">Pin 29</text>

  <!-- Row 2 -->
  <text x="160" y="337" class="label">2</text>
  <text x="260" y="337" class="label">Door Open</text>
  <text x="400" y="337" class="label">Courtesy light wire</text>
  <text x="540" y="337" class="label">Pin 31</text>

  <!-- Row 3 -->
  <text x="160" y="362" class="label">3</text>
  <text x="260" y="362" class="label">Rain Sensor</text>
  <text x="400" y="362" class="label">Windshield rain sensor</text>
  <text x="540" y="362" class="label">Pin 33</text>

  <!-- Row 4 -->
  <text x="160" y="387" class="label">4</text>
  <text x="260" y="387" class="label">Washer Sprayer</text>
  <text x="400" y="387" class="label">Washer pump relay</text>
  <text x="540" y="387" class="label">Pin 35</text>

  <!-- Row 5 -->
  <text x="160" y="412" class="label">5</text>
  <text x="260" y="412" class="label">Central Lock</text>
  <text x="400" y="412" class="label">Lock actuator wire</text>
  <text x="540" y="412" class="label">Pin 37</text>

  <!-- Notes -->
  <rect x="30" y="460" width="740" height="15" fill="none"/>
  <text x="400" y="472" class="pin" text-anchor="middle">All signals: 12V active = GPIO reads LOW (phototransistor conducts, pulls pin to GND)</text>
</svg>
